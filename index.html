<!DOCTYPE html>
<html>
  <style>
  #text {
    font-family: OCR A Std, monospace;
    text-align: center;
    color: #E6A22C;
  }
  #main {
  border-radius: 25px;
  width: 400px;
  border: solid blue;
  background-color: #E62C70;
  padding: 50px;
  margin: auto;
  }
  #counter{
  border-radius: 25px;
  width: 200px;
  border: solid blue;
  background-color: #E62C70;
  padding: 10px;
  margin: auto;
  height: 120px;
  }
  }
  img {
  display: block;
  margin: auto;
  display: flex;
  }
  body {
  min-height: 100vh;
  background-attachment: fixed;
  background: linear-gradient(180deg, #29cfcf, #b1b1e7);
  margin: 0;
  .center {
  display: flex; 
  margin: auto; 
  justify-content: center;
  }
  .rotate {
      transform: rotate(-30deg);
  }
  .twist {
  padding: 10px 20px;
  transition: 1s;
  font-family: "Comic Sans MS", cursive;
  color: #fff;
  background: #887CC8;
  text-shadow: 2px 2px #000;
  border: 4px outset #f0f;
}
.twist:hover, .easyhome:hover {
  transform: rotate(360deg);
}nset #f0f;

  .twist2 {
  padding: 10px 20px;
  transition: 2s;
  font-family: "Comic Sans MS", cursive;
  color: #fff;
  background: #C8B04F;
  text-shadow: 2px 2px #000;
  border: 4px outset #DBB04F;
}
}
.marquee{
  padding: 10px 20px;
  border-radius: 25px;
  background: #887CC8;
  font-weight: bold;
}
    @keyframes track {
    from {background-color: red;}
    to {background-color: yellow;}
    }
   .side {
   flex: 20%;
    background-color: #f1f1f1;
    padding: 20px;
   }
.main {
  flex: 20%;
  background-color: white;
  padding: 20px;
}#gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px; 
    padding: 20px;
}

#gallery button {
    width: 50%;
    height: 50px;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.5s ease;
}

#gallery button:hover {
    transform: rotate(10deg);
    cursor: pointer;
}

  </style>
  <body>
    <title>Whs's Website</title>
    <div id="main">
    <marquee scrollamount="10" class="center marquee" id="text">Welcome to my website!</marquee>
    <h1 id="text">CodeClub Website</h1>
      <p id="text" class="center">You can post any projects here that you want! (Mostly)</p>
	  <div id="gallery">
      <a href="http://martycat111.github.io"><button class="twist2 center">Random cat game</button></a>
	  </div>
	  <h3 id="text">other versions of this website...</h3>
	  <div class="center">
	  <a href="/zelle/index.html"><button class="twist2">Zelle's</button></a>
	  <a href="/willemsite/index.html"><button class="twist2">Willem's</button></a>
	  <a href="http://lazerkatsweirdstuff.github.io/amicable-miner"><button class="twist2">Hendrik's</button></a>
	  </div>
    </div>
    <div id="counter" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
    <h3 style="color: #70E62C; font-family: Consolas;">You are visitor number:
    </h3><div>
    <script type="text/javascript" src="https://counter.websiteout.com/js/24/4/0/0"></script>
    </div>
    </div>
    </body>
</html>

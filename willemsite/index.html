<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: white;
        }

        p, h3, button {
            color: black;
            text-align: center;
            font-family: "Lucida Console", "Courier New", monospace;
            margin: 10px 0;
        }
        
        h1 {
            font-weight: 900;
            color: black;
            text-align: center;
            font-family: "Lucida Console", "Courier New", monospace;
            margin: 10px 0;
        }

        #counter {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: 10px 0;
        }

        .cat {
            box-shadow: 0px 4px 0px 0px #000000;
            background: linear-gradient(to bottom, #ffffff 5%, #ffffff 100%);
            background-color: #ffffff;
            border: 1px solid #000000;
            display: inline-block;
            cursor: pointer;
            color: #000000;
            font-family: "Lucida Console", "Courier New", monospace;
            font-size: 17px;
            padding: 16px 31px;
            text-decoration: none;
            margin: 5px;
        }
        
        .cat:hover {
            background: linear-gradient(to bottom, #ffffff 5%, #ffffff 100%);
            background-color: #ffffff;
        }
        
        .cat:active {
            position: relative;
            top: 1px;
        }

        .button-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Code Club</h1>
    <p>really cool</p>
    <br>
    <p>on tuesdays after school</p>

    <h3>foreboding h3 element</h3>

    <p>you can learn cool stuff :DDD</p>

    <br>
    <p>you are visitor number</p>
    
    <div id="counter">
        <script type="text/javascript" src="https://counter.websiteout.com/js/5/0/0/0"></script>
    </div>
    
    <br>
    
    <div class="button-container">
        <a href="http://martycat111.github.io" class="cat">Random Cat Game</a>
        <a href="https://github.com/3DGameMaker/MiniWINCMD" class="cat">My Operating System</a>
    </div>
</body>
</html>
